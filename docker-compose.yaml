


version: '3.8'

services:
  ctf-challenge:
    build:
      context: .
      dockerfile: src/docker/Dockerfile
    ports:
      - "4444:4444"
    networks:
      - CTF
    mem_limit: 128m
    cpus: '0.5'
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # removed: no-new-privileges (breaks privesc)
    # removed: read_only (breaks vim/sudo/python)
    restart: unless-stopped

  ctf-web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./web:/usr/share/nginx/html
    networks:
      - CTF

networks:
  CTF:
    name: CTF
    driver: bridge
    internal: false 


  